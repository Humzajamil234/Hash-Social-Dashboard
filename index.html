<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hatch Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #b2d8d8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 28px;
        }

        .logo-img {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            object-fit: cover;
            margin-bottom: 12px;
        }

        .brand-title {
            font-size: 22px;
            font-weight: 700;
            color: #2d3142;
            margin-bottom: 4px;
        }

        .brand-subtitle {
            font-size: 13px;
            color: #7a8499;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #7a8499;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #dce3ec;
            border-radius: 8px;
            font-size: 14px;
            color: #2d3142;
            background: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: #E91E8C;
        }

        .form-input::placeholder {
            color: #b0b8c4;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #7a8499;
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
        }

        .error-msg {
            display: none;
            color: #ef5350;
            font-size: 12px;
            margin-top: 6px;
            align-items: center;
            gap: 5px;
        }

        .signin-btn {
            width: 100%;
            padding: 13px;
            background: #E91E8C;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 8px;
        }

        .signin-btn:hover {
            background: #c2185b;
        }

        .signin-btn:active {
            transform: scale(0.98);
        }

        .signin-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .mock-note {
            text-align: center;
            font-size: 12px;
            color: #7a8499;
            margin-top: 20px;
            line-height: 1.5;
        }

        /* Forgot Password Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-box {
            background: #fff;
            border-radius: 14px;
            padding: 32px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: #2d3142;
            margin-bottom: 8px;
        }

        .modal-desc {
            font-size: 13px;
            color: #7a8499;
            margin-bottom: 20px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn-cancel {
            flex: 1;
            padding: 11px;
            background: #f0f2f5;
            color: #2d3142;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-btn-send {
            flex: 1;
            padding: 11px;
            background: #E91E8C;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .success-msg {
            text-align: center;
            padding: 10px 0;
        }

        .success-msg i {
            font-size: 40px;
            color: #26a69a;
            margin-bottom: 12px;
        }

        .success-msg h3 {
            font-size: 18px;
            color: #2d3142;
            margin-bottom: 8px;
        }

        .success-msg p {
            font-size: 13px;
            color: #7a8499;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <!-- Logo -->
        <div class="logo-area">
            <img src="./images/logo hash.jpg" alt="Hatch Admin" class="logo-img"
                 onerror="this.onerror=null; this.style.display='none'">
            <div class="brand-title">Hatch Admin</div>
            <div class="brand-subtitle">Nest trust &amp; safety console</div>
        </div>

        <!-- Form -->
        <form id="signin-form">
            <div class="form-group">
                <label class="form-label" for="email">Staff Email</label>
                <input type="email" id="email" class="form-input"
                       placeholder="hatch.ops@nest.app" autocomplete="email">
                <div class="error-msg" id="email-error">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>Please enter a valid email address</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" class="form-input"
                           placeholder="••••••••" autocomplete="current-password">
                    <button type="button" class="toggle-password" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="error-msg" id="password-error">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>Please enter your password</span>
                </div>
            </div>

            <button type="submit" class="signin-btn" id="signin-btn">Sign in</button>
        </form>

        <p class="mock-note">
            Mocked auth — any email + 4-char password signs you in as a<br>super-admin operator.
        </p>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal-overlay" id="forgotModal">
        <div class="modal-box">
            <div class="brand-title" style="margin-bottom:6px;">Reset Password</div>
            <div id="modalBody">
                <p class="modal-desc">Enter your email to receive password reset instructions.</p>
                <div class="form-group">
                    <label class="form-label" for="forgotEmail">Email Address</label>
                    <input type="email" id="forgotEmail" class="form-input" placeholder="Enter your email">
                    <div class="error-msg" id="forgotError">
                        <i class="fas fa-exclamation-circle"></i>
                        <span>Please enter a valid email address</span>
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="modal-btn-cancel" id="modalClose">Cancel</button>
                    <button class="modal-btn-send" id="sendResetBtn">Send Reset Link</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const signinForm = document.getElementById('signin-form');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const togglePassword = document.getElementById('togglePassword');
            const signinBtn = document.getElementById('signin-btn');
            const forgotModal = document.getElementById('forgotModal');
            const modalClose = document.getElementById('modalClose');
            const sendResetBtn = document.getElementById('sendResetBtn');
            const forgotEmail = document.getElementById('forgotEmail');

            // Auto-fill demo credentials
            setTimeout(() => {
                emailInput.value = 'admin@gmail.com';
                passwordInput.value = '12345678';
            }, 300);

            // Password toggle
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                this.querySelector('i').className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
            });

            function showError(id, msg) {
                const el = document.getElementById(id);
                if (msg) el.querySelector('span').textContent = msg;
                el.style.display = 'flex';
            }

            function hideError(id) {
                document.getElementById(id).style.display = 'none';
            }

            function showLoading() {
                const orig = signinBtn.innerHTML;
                signinBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
                signinBtn.disabled = true;
                return orig;
            }

            function hideLoading(orig) {
                signinBtn.innerHTML = orig;
                signinBtn.disabled = false;
            }

            async function fetchHatchAPI(endpoint, method = 'GET', body = null) {
                try {
                    const url = `/api${endpoint}`;
                    const headers = { 'Content-Type': 'application/json', 'Accept': 'application/json' };
                    const token = localStorage.getItem('hatch_admin_token');
                    if (token) headers['Authorization'] = `Bearer ${token}`;
                    const options = { method, headers };
                    if (body) options.body = JSON.stringify(body);
                    const response = await fetch(url, options);
                    return await response.json();
                } catch (error) {
                    return { success: false, message: 'Network error' };
                }
            }

            async function adminLogin(email, password) {
                const orig = showLoading();
                try {
                    const response = await fetchHatchAPI('/login', 'POST', { email, password });
                    if (response.success && response.token) {
                        localStorage.setItem('hatch_admin_token', response.token);
                        const u = response.user_info || response.user || {};
                        sessionStorage.setItem('currentAdmin', JSON.stringify({
                            name: u.name || u.first_name || 'Admin User',
                            email: u.email || email,
                            role: u.type || u.role || 'admin',
                            loginTime: new Date().toISOString(),
                            userId: u.id || 1
                        }));
                        signinBtn.innerHTML = '<i class="fas fa-check"></i> Redirecting...';
                        signinBtn.style.background = '#26a69a';
                        setTimeout(() => { window.location.href = 'dashboard.html'; }, 900);
                    } else {
                        throw new Error(response.message || 'Invalid credentials');
                    }
                } catch (error) {
                    hideLoading(orig);
                    hideError('email-error');
                    showError('password-error', error.message || 'Login failed. Please try again.');
                }
            }

            signinForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                const email = emailInput.value.trim();
                const password = passwordInput.value.trim();
                hideError('email-error');
                hideError('password-error');
                if (!email || !email.includes('@')) { showError('email-error', 'Please enter a valid email'); return; }
                if (!password) { showError('password-error', 'Please enter your password'); return; }
                await adminLogin(email, password);
            });

            // Forgot password modal
            forgotModal.addEventListener('click', function(e) { if (e.target === forgotModal) forgotModal.style.display = 'none'; });
            modalClose.addEventListener('click', () => { forgotModal.style.display = 'none'; });

            sendResetBtn.addEventListener('click', async function() {
                const email = forgotEmail.value.trim();
                if (!email || !email.includes('@')) { document.getElementById('forgotError').style.display = 'flex'; return; }
                const orig = sendResetBtn.innerHTML;
                sendResetBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
                sendResetBtn.disabled = true;
                try {
                    await fetchHatchAPI('/password/email', 'POST', { email });
                    document.getElementById('modalBody').innerHTML = `
                        <div class="success-msg">
                            <i class="fas fa-check-circle"></i>
                            <h3>Reset Link Sent!</h3>
                            <p>Password reset instructions sent to:<br><strong>${email}</strong></p>
                        </div>`;
                    setTimeout(() => { forgotModal.style.display = 'none'; }, 3000);
                } catch(err) {
                    sendResetBtn.innerHTML = orig;
                    sendResetBtn.disabled = false;
                }
            });

            document.addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.key === 'Enter') signinForm.requestSubmit();
                if (e.key === 'Escape' && forgotModal.style.display === 'flex') forgotModal.style.display = 'none';
            });
        });
    </script>
</body>
</html>
